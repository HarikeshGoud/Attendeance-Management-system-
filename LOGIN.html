<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS | Intelligent Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #2c3e50;
            background-image:
                radial-gradient(at 0% 0%, #1e293b 0, transparent 50%),
                radial-gradient(at 100% 0%, #0d9488 0, transparent 50%),
                radial-gradient(at 100% 100%, #1e40af 0, transparent 50%),
                radial-gradient(at 0% 100%, #334155 0, transparent 50%);
            transition: all 1s ease;
        }

        .bg-icon {
            position: absolute;
            color: white;
            opacity: 0.12;
            pointer-events: none;
            z-index: -1;
            filter: blur(0.5px);
            animation: float-slow 20s infinite ease-in-out;
        }

        @keyframes float-slow {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(15px, -20px) rotate(3deg);
            }

            66% {
                transform: translate(-10px, 15px) rotate(-2deg);
            }
        }

        .role-btn {
            transition: all 0.3s ease;
        }

        .active-role {
            background-color: var(--theme-color) !important;
            color: white !important;
            box-shadow: 0 8px 20px -5px var(--theme-shadow);
        }

        /* Page transition overlay */
        #page-transition {
            position: fixed;
            inset: 0;
            background: #1e3a8a;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #page-transition.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div id="page-transition"></div>
    <div id="meshBg" class="mesh-gradient"></div>

    <i class="fa-solid fa-graduation-cap bg-icon text-[10rem] top-[5%] left-[8%]" style="animation-delay: 0s;"></i>
    <i class="fa-solid fa-book           bg-icon text-[8rem]  top-[15%] right-[10%]" style="animation-delay: 2s;"></i>
    <i class="fa-solid fa-award          bg-icon text-[12rem] bottom-[5%] left-[5%]" style="animation-delay: 4s;"></i>
    <i class="fa-solid fa-laptop-code    bg-icon text-[9rem]  bottom-[15%] right-[12%]"
        style="animation-delay: 1s;"></i>
    <i class="fa-solid fa-school         bg-icon text-[14rem] top-[40%] left-[2%]" style="animation-delay: 3s;"></i>
    <i class="fa-solid fa-pencil         bg-icon text-[7rem]  top-[50%] right-[3%]" style="animation-delay: 5s;"></i>

    <div
        class="relative z-10 w-full max-w-[460px] bg-white rounded-[2.5rem] p-10 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)]">

        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-3">Sign In</h1>
            <p class="text-slate-500 font-medium">Select your role to access your dashboard.</p>
        </div>

        <div class="bg-slate-100 p-1.5 rounded-[1.5rem] flex mb-10">
            <button type="button" onclick="updateUI('admin')" id="btn-admin"
                class="role-btn flex-1 py-3.5 text-sm font-bold rounded-[1.2rem] text-slate-500">
                Admin
            </button>
            <button type="button" onclick="updateUI('teacher')" id="btn-teacher"
                class="role-btn flex-1 py-3.5 text-sm font-bold rounded-[1.2rem] text-slate-500">
                Teacher
            </button>
            <button type="button" onclick="updateUI('student')" id="btn-student"
                class="role-btn active-role flex-1 py-3.5 text-sm font-bold rounded-[1.2rem]"
                style="--theme-color: #0d9488; --theme-shadow: rgba(13, 148, 136, 0.4);">
                Student
            </button>
        </div>

        <form class="space-y-6" onsubmit="handleLogin(event)">
            <div>
                <label id="idLabel" class="text-[14px] font-bold text-slate-700 block mb-3 ml-1">Student Roll
                    Number</label>
                <input type="text" id="userInput" required
                    class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 focus:outline-none transition-all font-medium text-slate-700"
                    placeholder="e.g. 2024-CSE-042">
            </div>

            <div>
                <label class="text-[14px] font-bold text-slate-700 block mb-3 ml-1">Security Password</label>
                <input type="password" required
                    class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 focus:outline-none transition-all font-medium text-slate-700"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-4 rounded-2xl text-white font-bold text-lg shadow-xl transition-all duration-300 hover:brightness-110 active:scale-[0.98] bg-[#0d9488]">
                Enter Dashboard
            </button>

            <p id="login-error" class="hidden text-center text-red-500 text-sm font-bold mt-2"></p>
        </form>

        <div class="mt-10 text-center">
            <p id="footerNote" class="text-[11px] text-slate-400 font-bold tracking-[0.15em] uppercase">Biometric Face
                ID Required for Teachers</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ─── THEME CONFIG ──────────────────────────────────────────────────────
        const themes = {
            admin: {
                color: '#1e293b',
                shadow: 'rgba(30, 41, 59, 0.4)',
                label: 'Admin ID / Email',
                hint: 'admin@system.com',
                gradient: 'radial-gradient(at 0% 0%, #334155 0, transparent 50%), radial-gradient(at 100% 100%, #0f172a 0, transparent 50%)',
                // ✅ Use exact filename — spaces encoded as %20
                destination: 'admin%20portal.html'
            },
            teacher: {
                color: '#2563eb',
                shadow: 'rgba(37, 99, 235, 0.4)',
                label: 'Staff ID / Email',
                hint: 'teacher_01@college.edu',
                gradient: 'radial-gradient(at 0% 0%, #3b82f6 0, transparent 50%), radial-gradient(at 100% 100%, #1e3a8a 0, transparent 50%)',
                // ✅ Points to hub.html (make sure your file is named hub.html)
                //    OR change this to 'teacher%20portal.html' if that's your actual filename
                destination: 'scanner.html'
            },
            student: {
                color: '#0d9488',
                shadow: 'rgba(13, 148, 136, 0.4)',
                label: 'Student Roll Number',
                hint: 'e.g. 2024-CSE-042',
                gradient: 'radial-gradient(at 0% 0%, #1e293b 0, transparent 50%), radial-gradient(at 100% 0%, #0d9488 0, transparent 50%), radial-gradient(at 100% 100%, #1e40af 0, transparent 50%)',
                // ✅ Spaces encoded as %20
                destination: 'student%20dashboard.html'
            }
        };

        let currentRole = 'student';

        function updateUI(role) {
            currentRole = role;
            const theme = themes[role];
            const meshBg = document.getElementById('meshBg');

            // Reset all buttons
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active-role');
                btn.classList.add('text-slate-500');
                btn.style.removeProperty('--theme-color');
                btn.style.removeProperty('--theme-shadow');
            });

            // Activate selected button
            const activeBtn = document.getElementById('btn-' + role);
            activeBtn.classList.add('active-role');
            activeBtn.classList.remove('text-slate-500');
            activeBtn.style.setProperty('--theme-color', theme.color);
            activeBtn.style.setProperty('--theme-shadow', theme.shadow);

            // Update background and form
            meshBg.style.backgroundImage = theme.gradient;
            document.getElementById('idLabel').innerText = theme.label;
            document.getElementById('userInput').placeholder = theme.hint;
            document.getElementById('submitBtn').style.backgroundColor = theme.color;
        }

        // Default on load
        updateUI('student');

        // ─── LOGIN HANDLER ─────────────────────────────────────────────────────
        async function handleLogin(event) {
            event.preventDefault();
            const identifier = document.getElementById('userInput').value.trim();
            const password   = document.querySelector('input[type="password"]').value;
            const btn        = document.getElementById('submitBtn');
            const overlay    = document.getElementById('page-transition');

            btn.disabled = true;
            btn.textContent = 'Authenticating...';

            try {
                await AMS.login(identifier, password, currentRole);
                overlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = themes[currentRole].destination;
                }, 350);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Enter Dashboard';
                const errEl = document.getElementById('login-error');
                errEl.textContent = err.message || 'Invalid credentials';
                errEl.classList.remove('hidden');
                setTimeout(() => errEl.classList.add('hidden'), 3000);
            }
        }

        // Fade in on load / back-button
        window.addEventListener('pageshow', function () {
            const overlay = document.getElementById('page-transition');
            overlay.style.transition = 'none';
            overlay.classList.remove('active');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    overlay.style.transition = 'opacity 0.35s ease';
                });
            });
        });
    </script>
</body>

</html>
