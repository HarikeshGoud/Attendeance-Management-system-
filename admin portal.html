<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Plus Jakarta Sans',sans-serif; margin:0; background-color:#0f172a; }
        .mesh-gradient { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2;
            background-image: radial-gradient(at 0% 0%,#1e293b 0,transparent 50%), radial-gradient(at 100% 0%,#334155 0,transparent 50%), radial-gradient(at 50% 100%,#020617 0,transparent 50%); }
        .glass-card { background:rgba(255,255,255,0.98); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.4); }
        .stat-card { transition:transform 0.3s,box-shadow 0.3s; }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 20px 25px -5px rgba(0,0,0,0.15); }
        #sidebar { transition:width 0.3s cubic-bezier(0.4,0,0.2,1); }
        .sidebar-collapsed { width:85px!important; }
        .sidebar-collapsed .nav-text, .sidebar-collapsed .admin-text { display:none; }
        .sidebar-collapsed .nav-item { justify-content:center; padding:0.75rem 0; }
        .main-viewport::-webkit-scrollbar { width:6px; }
        .main-viewport::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:10px; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex">
<div class="mesh-gradient"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="w-72 hidden lg:flex flex-col border-r border-white/10 h-screen sticky top-0 p-6 z-50 bg-slate-900/10 backdrop-blur-md">
    <div onclick="toggleSidebar()" class="flex items-center gap-3 mb-12 text-white cursor-pointer group">
        <div class="w-10 h-10 bg-slate-700 rounded-xl flex-shrink-0 flex items-center justify-center shadow-lg border border-slate-500/50 group-hover:border-blue-400 transition-all">
            <i class="fa-solid fa-shield-halved text-lg"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight admin-text">AMS <span class="font-light opacity-70">Admin</span></h1>
    </div>
    <nav class="space-y-2 flex-1">
        <a href="admin portal.html" class="nav-item flex items-center gap-4 px-4 py-3 bg-white/10 text-white rounded-2xl font-bold transition-all">
            <i class="fa-solid fa-chart-pie w-5 text-center"></i><span class="nav-text">Dashboard</span>
        </a>
        <a href="manageuser.html" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl font-semibold transition-all">
            <i class="fa-solid fa-user-group w-5 text-center"></i><span class="nav-text">Manage Users</span>
        </a>
        <a href="attendancepageadmin.html" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl font-semibold transition-all">
            <i class="fa-solid fa-calendar-check w-5 text-center"></i><span class="nav-text">Attendance</span>
        </a>
        <a href="analyticsadmin.html" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl font-semibold transition-all">
            <i class="fa-solid fa-chart-line w-5 text-center"></i><span class="nav-text">Analytics</span>
        </a>
    </nav>
    <div class="pt-6 border-t border-white/10">
        <button onclick="AMS.logout()" class="nav-item w-full flex items-center gap-4 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-2xl font-bold transition-all">
            <i class="fa-solid fa-power-off w-5 text-center"></i><span class="nav-text">Logout</span>
        </button>
    </div>
</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="h-20 flex items-center justify-between px-8 text-white relative z-50">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden text-white text-xl"><i class="fa-solid fa-bars"></i></button>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">System Overview</p>
                <p class="text-sm font-medium opacity-70" id="admin-welcome">Welcome back, Admin</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-2 px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-xl">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-xs font-bold uppercase tracking-tighter text-white">System Live</span>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-white font-black text-sm" id="admin-avatar">AD</div>
        </div>
    </header>

    <main class="main-viewport flex-1 overflow-y-auto p-4 md:p-8 pt-2">
        <div class="max-w-7xl mx-auto space-y-8">

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass-card stat-card p-6 rounded-[2rem] flex items-center gap-5">
                    <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-users"></i></div>
                    <div><p class="text-slate-400 text-xs font-bold uppercase">Total Students</p><h2 class="text-2xl font-black" id="stat-students">--</h2></div>
                </div>
                <div class="glass-card stat-card p-6 rounded-[2rem] flex items-center gap-5">
                    <div class="w-14 h-14 bg-teal-100 text-teal-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-user-tie"></i></div>
                    <div><p class="text-slate-400 text-xs font-bold uppercase">Active Faculty</p><h2 class="text-2xl font-black" id="stat-teachers">--</h2></div>
                </div>
                <div class="glass-card stat-card p-6 rounded-[2rem] flex items-center gap-5">
                    <div class="w-14 h-14 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-building-columns"></i></div>
                    <div><p class="text-slate-400 text-xs font-bold uppercase">Departments</p><h2 class="text-2xl font-black" id="stat-depts">--</h2></div>
                </div>
                <div class="glass-card stat-card p-6 rounded-[2rem] flex items-center gap-5">
                    <div class="w-14 h-14 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-chart-bar"></i></div>
                    <div><p class="text-slate-400 text-xs font-bold uppercase">Avg Attendance</p><h2 class="text-2xl font-black text-green-600" id="stat-avg-att">--%</h2></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Recent Activity -->
                <div class="lg:col-span-2 glass-card rounded-[2.5rem] p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-xl text-slate-900">Recent Activity</h3>
                        <a href="attendancepageadmin.html" class="text-xs font-bold text-blue-600 hover:underline">View All →</a>
                    </div>
                    <div id="recent-activity" class="space-y-3">
                        <p class="text-slate-400 text-sm">Loading...</p>
                    </div>
                </div>

                <!-- System Actions -->
                <div class="glass-card rounded-[2.5rem] p-8">
                    <h3 class="font-black text-xl mb-6 text-slate-900">Quick Actions</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <button onclick="document.getElementById('add-user-modal').classList.remove('hidden')"
                            class="flex items-center gap-4 p-4 rounded-2xl bg-blue-50 border border-blue-100 hover:bg-blue-100 transition-all group">
                            <div class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-user-plus"></i>
                            </div>
                            <div class="text-left">
                                <p class="font-bold text-sm text-slate-800">Add New User</p>
                                <p class="text-[10px] text-slate-400 uppercase">Register student or faculty</p>
                            </div>
                        </button>
                        <button onclick="window.location.href='manageuser.html'"
                            class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-slate-100 transition-all group">
                            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-600 shadow-sm group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-users"></i>
                            </div>
                            <div class="text-left">
                                <p class="font-bold text-sm">Manage Users</p>
                                <p class="text-[10px] text-slate-400 uppercase">View all users</p>
                            </div>
                        </button>
                        <button onclick="exportReport()"
                            class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-slate-100 transition-all group">
                            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-600 shadow-sm group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-file-export"></i>
                            </div>
                            <div class="text-left">
                                <p class="font-bold text-sm">Export Report</p>
                                <p class="text-[10px] text-slate-400 uppercase">Download CSV</p>
                            </div>
                        </button>
                        <button onclick="window.location.href='analyticsadmin.html'"
                            class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-slate-100 transition-all group">
                            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-600 shadow-sm group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-chart-line"></i>
                            </div>
                            <div class="text-left">
                                <p class="font-bold text-sm">View Analytics</p>
                                <p class="text-[10px] text-slate-400 uppercase">Attendance insights</p>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ADD USER MODAL -->
<div id="add-user-modal" class="modal-overlay hidden">
    <div class="bg-white rounded-[2rem] w-full max-w-lg mx-4 shadow-2xl">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <h3 class="font-black text-xl text-slate-800">Add New User</h3>
            <button onclick="document.getElementById('add-user-modal').classList.add('hidden')" class="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Role</label>
                <select id="new-role" onchange="toggleRoleFields()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Full Name</label>
                    <input id="new-name" type="text" placeholder="e.g. Rahul Sharma" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Identifier / ID</label>
                    <input id="new-identifier" type="text" placeholder="e.g. 2024-CSE-021" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Email</label>
                    <input id="new-email" type="email" placeholder="email@ams.edu" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Password</label>
                    <input id="new-password" type="password" placeholder="Min 6 characters" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <!-- Student-specific fields -->
            <div id="student-fields">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Class</label>
                <select id="new-class" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Loading classes...</option>
                </select>
            </div>
            <!-- Teacher-specific fields -->
            <div id="teacher-fields" class="hidden">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Department</label>
                <select id="new-dept" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Loading departments...</option>
                </select>
            </div>
            <p id="add-user-error" class="text-red-500 text-sm font-bold hidden"></p>
        </div>
        <div class="p-6 border-t border-slate-100 flex justify-end gap-3">
            <button onclick="document.getElementById('add-user-modal').classList.add('hidden')" class="px-6 py-3 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50">Cancel</button>
            <button onclick="addUser()" id="add-user-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Add User
            </button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-collapsed'); }

    async function loadDashboard() {
        if (!AMS.requireAuth('admin')) return;
        const user = AMS.getUser();
        document.getElementById('admin-welcome').textContent = 'Welcome back, ' + user.name;
        document.getElementById('admin-avatar').textContent = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();

        try {
            const data = await AMS.adminDashboard();
            const s = data.stats;
            document.getElementById('stat-students').textContent = s.totalStudents;
            document.getElementById('stat-teachers').textContent = s.totalTeachers;
            document.getElementById('stat-depts').textContent    = s.totalDepts;
            document.getElementById('stat-avg-att').textContent  = s.avgAttendance + '%';

            const act = document.getElementById('recent-activity');
            if (!data.recent_activity.length) {
                act.innerHTML = '<p class="text-slate-400 text-sm">No activity yet.</p>';
            } else {
                act.innerHTML = data.recent_activity.map(a => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center font-bold text-xs">
                                ${a.subject.split(' ').map(w=>w[0]).join('').slice(0,2)}
                            </div>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${a.subject}</p>
                                <p class="text-[10px] text-slate-400 uppercase font-bold">${a.class_name} Sec ${a.section} • ${a.date} • ${a.teacher}</p>
                            </div>
                        </div>
                        <span class="text-sm font-black ${a.total > 0 && (a.present/a.total)*100 >= 75 ? 'text-emerald-600' : 'text-red-500'}">
                            ${a.total > 0 ? Math.round(a.present/a.total*100) : 0}%
                        </span>
                    </div>`).join('');
            }

            // Load classes and departments for add user modal
            const [classes, depts] = await Promise.all([AMS.adminClasses(), AMS.adminDepartments()]);
            const classSelect = document.getElementById('new-class');
            classSelect.innerHTML = classes.map(c => `<option value="${c.id}">${c.name} - Section ${c.section}</option>`).join('');
            const deptSelect = document.getElementById('new-dept');
            deptSelect.innerHTML = depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        } catch(e) { console.error(e); }
    }

    function toggleRoleFields() {
        const role = document.getElementById('new-role').value;
        document.getElementById('student-fields').classList.toggle('hidden', role !== 'student');
        document.getElementById('teacher-fields').classList.toggle('hidden', role !== 'teacher');
    }

    async function addUser() {
        const role       = document.getElementById('new-role').value;
        const name       = document.getElementById('new-name').value.trim();
        const identifier = document.getElementById('new-identifier').value.trim();
        const email      = document.getElementById('new-email').value.trim();
        const password   = document.getElementById('new-password').value;
        const errEl      = document.getElementById('add-user-error');

        if (!name || !identifier || !password) {
            errEl.textContent = 'Name, Identifier and Password are required.';
            errEl.classList.remove('hidden'); return;
        }

        let extra = null;
        if (role === 'student') {
            const classId = document.getElementById('new-class').value;
            if (!classId) { errEl.textContent = 'Please select a class.'; errEl.classList.remove('hidden'); return; }
            extra = { roll_no: identifier, class_id: parseInt(classId), semester: 4 };
        } else if (role === 'teacher') {
            const deptId = document.getElementById('new-dept').value;
            if (!deptId) { errEl.textContent = 'Please select a department.'; errEl.classList.remove('hidden'); return; }
            extra = { staff_id: identifier, department_id: parseInt(deptId), designation: 'Assistant Professor' };
        }

        const btn = document.getElementById('add-user-btn');
        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Adding...';
        errEl.classList.add('hidden');

        try {
            await AMS.createUser({ identifier, password, role, name, email, extra });
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Added!';
            setTimeout(() => {
                document.getElementById('add-user-modal').classList.add('hidden');
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus"></i> Add User';
                ['new-name','new-identifier','new-email','new-password'].forEach(id => document.getElementById(id).value = '');
                loadDashboard();
            }, 1000);
        } catch(e) {
            errEl.textContent = e.message; errEl.classList.remove('hidden');
            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus"></i> Add User';
        }
    }

    async function exportReport() {
        try {
            const records = await AMS.adminReport('');
            if (!records.length) { alert('No records to export.'); return; }
            const headers = 'Student,Roll No,Date,Subject,Status,Teacher';
            const rows = records.map(r => `${r.student_name},${r.roll_no},${r.date},${r.subject_name},${r.status},${r.teacher_name}`);
            const csv = [headers, ...rows].join('\n');
            const a = document.createElement('a');
            a.href = 'data:text/csv,' + encodeURIComponent(csv);
            a.download = 'attendance_report.csv';
            a.click();
        } catch(e) { alert('Export failed: ' + e.message); }
    }

    loadDashboard();
</script>
</body>
</html>
