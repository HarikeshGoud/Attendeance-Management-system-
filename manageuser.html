<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS | Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Plus Jakarta Sans',sans-serif; background-color:#0f172a; }
        .mesh-gradient { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2;
            background-image:radial-gradient(at 0% 0%,#1e293b 0,transparent 50%),radial-gradient(at 100% 0%,#334155 0,transparent 50%),radial-gradient(at 50% 100%,#020617 0,transparent 50%); }
        .glass-card { background:rgba(255,255,255,0.95); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.3); box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); }
        #sidebar { transition:width 0.3s cubic-bezier(0.4,0,0.2,1); }
        .sidebar-collapsed { width:85px!important; }
        .sidebar-collapsed .nav-text, .sidebar-collapsed .admin-text { display:none; }
        .sidebar-collapsed .nav-item { justify-content:center; padding:0.75rem 0; }
        .main-viewport::-webkit-scrollbar { width:5px; }
        .main-viewport::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex">
<div class="mesh-gradient"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="w-72 hidden lg:flex flex-col border-r border-white/10 h-screen sticky top-0 p-6 z-50 bg-slate-900/20 backdrop-blur-md">
    <div onclick="toggleSidebar()" class="flex items-center gap-3 mb-12 text-white cursor-pointer group">
        <div class="w-10 h-10 bg-slate-800 rounded-xl flex-shrink-0 flex items-center justify-center border border-slate-700 group-hover:border-blue-500 transition-colors">
            <i class="fa-solid fa-shield-halved text-lg"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight admin-text">AMS <span class="font-light opacity-70">Admin</span></h1>
    </div>
    <nav class="space-y-1 flex-1">
        <a href="admin portal.html" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl transition-all">
            <i class="fa-solid fa-chart-pie w-5"></i><span class="nav-text font-semibold">Dashboard</span>
        </a>
        <a href="manageuser.html" class="nav-item flex items-center gap-4 px-4 py-3 text-blue-400 bg-white/5 rounded-2xl transition-all">
            <i class="fa-solid fa-user-group w-5"></i><span class="nav-text font-bold">Manage Users</span>
        </a>
        <a href="attendancepageadmin.html" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl transition-all">
            <i class="fa-solid fa-calendar-check w-5"></i><span class="nav-text font-semibold">Attendance</span>
        </a>
        <a href="analyticsadmin.html" class="nav-item flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl transition-all">
            <i class="fa-solid fa-chart-line w-5"></i><span class="nav-text font-semibold">Analytics</span>
        </a>
    </nav>
    <div class="pt-6 border-t border-white/10">
        <button onclick="AMS.logout()" class="nav-item w-full flex items-center gap-4 px-4 py-3 text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-2xl font-bold transition-all">
            <i class="fa-solid fa-power-off w-5"></i><span class="nav-text">Logout</span>
        </button>
    </div>
</aside>

<div class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="h-20 flex items-center justify-between px-8 text-white relative z-50">
        <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Administration</p>
            <h2 class="text-xl font-bold">User Directory</h2>
        </div>
        <div class="flex items-center gap-3">
            <select id="role-filter" onchange="applyFilters()" class="bg-slate-800/50 border border-slate-700 rounded-xl py-2 px-3 text-xs text-slate-300 focus:outline-none focus:border-blue-500 cursor-pointer">
                <option value="">All Roles</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
            </select>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input id="search-input" type="text" placeholder="Search by name or ID..." oninput="applyFilters()"
                    class="bg-slate-800/50 border border-slate-700 rounded-xl py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-blue-500 w-56">
            </div>
            <button onclick="document.getElementById('add-user-modal').classList.remove('hidden')"
                class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-user-plus text-xs"></i> Add User
            </button>
        </div>
    </header>

    <main class="main-viewport flex-1 overflow-y-auto p-4 md:p-8 pt-2">
        <div class="max-w-7xl mx-auto space-y-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-4 rounded-3xl flex items-center gap-4 border-l-4 border-l-blue-500">
                    <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-users"></i></div>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase">Total Users</p><p class="text-lg font-black" id="stat-total">--</p></div>
                </div>
                <div class="glass-card p-4 rounded-3xl flex items-center gap-4 border-l-4 border-l-teal-500">
                    <div class="w-10 h-10 rounded-xl bg-teal-50 flex items-center justify-center text-teal-600"><i class="fa-solid fa-user-tie"></i></div>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase">Faculty</p><p class="text-lg font-black" id="stat-faculty">--</p></div>
                </div>
                <div class="glass-card p-4 rounded-3xl flex items-center gap-4 border-l-4 border-l-green-500">
                    <div class="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center text-green-600"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase">Students</p><p class="text-lg font-black" id="stat-students">--</p></div>
                </div>
            </div>

            <!-- Table -->
            <div class="glass-card rounded-[2.5rem] overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-black text-slate-900">Directory Records</h3>
                        <p class="text-sm text-slate-500 font-medium">All registered institutional members</p>
                    </div>
                    <button onclick="exportUsers()" class="p-2.5 bg-slate-100 rounded-xl text-slate-600 hover:bg-slate-200 transition-colors" title="Export CSV">
                        <i class="fa-solid fa-file-csv"></i>
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-100">
                                <th class="px-8 py-5 font-bold">User</th>
                                <th class="px-8 py-5 font-bold">Role</th>
                                <th class="px-8 py-5 font-bold">Identifier</th>
                                <th class="px-8 py-5 font-bold">Email</th>
                                <th class="px-8 py-5 font-bold">Joined</th>
                                <th class="px-8 py-5 font-bold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr><td colspan="6" class="px-8 py-12 text-center text-slate-400">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="p-5 bg-slate-50/50 flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest border-t border-slate-100">
                    <span id="showing-count">Showing 0 users</span>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ADD USER MODAL -->
<div id="add-user-modal" class="modal-overlay hidden">
    <div class="bg-white rounded-[2rem] w-full max-w-lg mx-4 shadow-2xl">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <h3 class="font-black text-xl text-slate-800">Add New User</h3>
            <button onclick="document.getElementById('add-user-modal').classList.add('hidden')" class="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Role</label>
                <select id="new-role" onchange="toggleRoleFields()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Full Name</label>
                    <input id="new-name" type="text" placeholder="Full name" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Identifier</label>
                    <input id="new-identifier" type="text" placeholder="e.g. 2024-CSE-021" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Email</label>
                    <input id="new-email" type="email" placeholder="email@ams.edu" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Password</label>
                    <input id="new-password" type="password" placeholder="Min 6 chars" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div id="student-fields">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Class</label>
                <select id="new-class" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
            </div>
            <div id="teacher-fields" class="hidden">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Department</label>
                <select id="new-dept" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
            </div>
            <p id="add-error" class="text-red-500 text-sm font-bold hidden"></p>
        </div>
        <div class="p-6 border-t border-slate-100 flex justify-end gap-3">
            <button onclick="document.getElementById('add-user-modal').classList.add('hidden')" class="px-6 py-3 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50">Cancel</button>
            <button onclick="addUser()" id="add-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Add User
            </button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-collapsed'); }

    let allUsers = [];
    let classes = [], depts = [];

    async function loadAll() {
        if (!AMS.requireAuth('admin')) return;
        try {
            const [data, cls, dep] = await Promise.all([AMS.adminUsers(''), AMS.adminClasses(), AMS.adminDepartments()]);
            allUsers = data.users;
            classes = cls; depts = dep;

            document.getElementById('stat-total').textContent   = data.total;
            document.getElementById('stat-faculty').textContent = allUsers.filter(u=>u.role==='teacher').length;
            document.getElementById('stat-students').textContent= allUsers.filter(u=>u.role==='student').length;

            document.getElementById('new-class').innerHTML = cls.map(c=>`<option value="${c.id}">${c.name} - Section ${c.section}</option>`).join('');
            document.getElementById('new-dept').innerHTML  = dep.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');

            renderTable(allUsers);
        } catch(e) { console.error(e); }
    }

    function applyFilters() {
        const role   = document.getElementById('role-filter').value;
        const search = document.getElementById('search-input').value.toLowerCase();
        const filtered = allUsers.filter(u => {
            const matchRole   = !role   || u.role === role;
            const matchSearch = !search || u.name.toLowerCase().includes(search) || u.identifier.toLowerCase().includes(search);
            return matchRole && matchSearch;
        });
        renderTable(filtered);
    }

    const roleColors = { admin:'purple', teacher:'blue', student:'teal' };

    function renderTable(users) {
        document.getElementById('showing-count').textContent = `Showing ${users.length} user${users.length !== 1 ? 's' : ''}`;
        const tbody = document.getElementById('users-tbody');
        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-8 py-12 text-center text-slate-400">No users found</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => {
            const c = roleColors[u.role] || 'slate';
            const initials = u.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
            const date = u.created_at ? u.created_at.split('T')[0] : '—';
            return `<tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
                <td class="px-8 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-${c}-100 text-${c}-700 flex items-center justify-center font-bold text-sm flex-shrink-0">${initials}</div>
                        <p class="font-bold text-slate-900">${u.name}</p>
                    </div>
                </td>
                <td class="px-8 py-4"><span class="px-3 py-1 bg-${c}-50 text-${c}-600 rounded-full text-[10px] font-black uppercase">${u.role}</span></td>
                <td class="px-8 py-4 font-mono text-xs text-slate-500">${u.identifier}</td>
                <td class="px-8 py-4 text-xs text-slate-500">${u.email || '—'}</td>
                <td class="px-8 py-4 text-xs text-slate-400">${date}</td>
                <td class="px-8 py-4 text-right">
                    <button onclick="deleteUser(${u.id},'${u.name.replace(/'/g,"\\'")}') "
                        class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-600 transition-all ml-auto">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    async function deleteUser(id, name) {
        if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
        try {
            await AMS.deleteUser(id);
            allUsers = allUsers.filter(u => u.id !== id);
            document.getElementById('stat-total').textContent    = allUsers.length;
            document.getElementById('stat-faculty').textContent  = allUsers.filter(u=>u.role==='teacher').length;
            document.getElementById('stat-students').textContent = allUsers.filter(u=>u.role==='student').length;
            applyFilters();
        } catch(e) { alert(e.message); }
    }

    function toggleRoleFields() {
        const role = document.getElementById('new-role').value;
        document.getElementById('student-fields').classList.toggle('hidden', role !== 'student');
        document.getElementById('teacher-fields').classList.toggle('hidden', role !== 'teacher');
    }

    async function addUser() {
        const role       = document.getElementById('new-role').value;
        const name       = document.getElementById('new-name').value.trim();
        const identifier = document.getElementById('new-identifier').value.trim();
        const email      = document.getElementById('new-email').value.trim();
        const password   = document.getElementById('new-password').value;
        const errEl      = document.getElementById('add-error');

        if (!name || !identifier || !password) {
            errEl.textContent = 'Name, Identifier and Password are required.';
            errEl.classList.remove('hidden'); return;
        }

        let extra = null;
        if (role === 'student') {
            const classId = document.getElementById('new-class').value;
            extra = { roll_no: identifier, class_id: parseInt(classId), semester: 4 };
        } else if (role === 'teacher') {
            const deptId = document.getElementById('new-dept').value;
            extra = { staff_id: identifier, department_id: parseInt(deptId), designation: 'Assistant Professor' };
        }

        const btn = document.getElementById('add-btn');
        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Adding...';
        errEl.classList.add('hidden');

        try {
            await AMS.createUser({ identifier, password, role, name, email, extra });
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Added!';
            setTimeout(() => {
                document.getElementById('add-user-modal').classList.add('hidden');
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus"></i> Add User';
                ['new-name','new-identifier','new-email','new-password'].forEach(id => document.getElementById(id).value = '');
                loadAll();
            }, 1000);
        } catch(e) {
            errEl.textContent = e.message; errEl.classList.remove('hidden');
            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus"></i> Add User';
        }
    }

    function exportUsers() {
        const headers = 'Name,Role,Identifier,Email,Joined';
        const rows = allUsers.map(u => `${u.name},${u.role},${u.identifier},${u.email||''},${u.created_at||''}`);
        const csv = [headers, ...rows].join('\n');
        const a = document.createElement('a');
        a.href = 'data:text/csv,' + encodeURIComponent(csv);
        a.download = 'users.csv'; a.click();
    }

    loadAll();
</script>
</body>
</html>
